<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dieta">
<meta name="theme-color" content="#0D0D0D">
<title>Dieta Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#0D0D0D;color:#F0EDE6;font-family:'DM Sans','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
#root{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;padding-bottom:100px;padding-top:env(safe-area-inset-top)}
input{font-family:inherit;font-size:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:32px;height:32px;border:3px solid #333;border-top-color:#E8572A;border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-type="module">
const {useState, useEffect, useRef, useCallback} = React;

const DAYS_IT = ["DOMENICA","LUNEDI","MARTEDI","MERCOLEDI","GIOVEDI","VENERDI","SABATO"];
const BASE_TARGETS = {
  LUNEDI:{label:"Pochi carboidrati",kcal:1400,carb:14,fat:44,prot:226,fib:0},
  MARTEDI:{label:"Medi carboidrati",kcal:1600,carb:90,fat:44,prot:211,fib:18},
  MERCOLEDI:{label:"Molti carboidrati",kcal:2000,carb:289,fat:21,prot:164,fib:41},
  GIOVEDI:{label:"Pochi carboidrati",kcal:1400,carb:14,fat:44,prot:226,fib:0},
  VENERDI:{label:"Medi carboidrati",kcal:1600,carb:90,fat:44,prot:211,fib:18},
  SABATO:{label:"Medi carboidrati",kcal:1600,carb:90,fat:44,prot:211,fib:18},
  DOMENICA:{label:"Molti carboidrati",kcal:2000,carb:289,fat:21,prot:164,fib:41},
};

// Reference profile: the person these targets were designed for
const REF_PROFILE = {gender:"M",height:182,weight:85,age:49};
function calcBMR(p) {
  const base = 10*p.weight + 6.25*p.height - 5*p.age;
  return p.gender==="F" ? base - 161 : base + 5;
}
const REF_BMR = calcBMR(REF_PROFILE);

function scaledTargets(profile) {
  if (!profile) return BASE_TARGETS;
  const ratio = calcBMR(profile) / REF_BMR;
  const scaled = {};
  for (const [day, t] of Object.entries(BASE_TARGETS)) {
    scaled[day] = {label:t.label, kcal:Math.round(t.kcal*ratio), carb:Math.round(t.carb*ratio), fat:Math.round(t.fat*ratio), prot:Math.round(t.prot*ratio), fib:Math.round(t.fib*ratio)};
  }
  return scaled;
}

const DEFAULT_FOODS = [
  {id:"f1",name:"Olio (1 cucchiaio)",kcal:50,carb:0,fat:5.5,prot:0,fib:0,portion:"1 cucchiaio"},
  {id:"f2",name:"Salsa di soia (1 cucchiaio)",kcal:10,carb:0.5,fat:0,prot:1.5,fib:0,portion:"1 cucchiaio"},
  {id:"f3",name:"Latte di riso (100ml)",kcal:65,carb:14,fat:0.8,prot:0.3,fib:0.2,portion:"100 ml"},
  {id:"f4",name:"Latte di cocco (100g)",kcal:220,carb:4,fat:22,prot:0,fib:0,portion:"100 g"},
  {id:"f5",name:"Dado vegetale",kcal:10,carb:1,fat:0,prot:1,fib:0,portion:"1 dado"},
  {id:"f6",name:"Olive nere (10)",kcal:30,carb:3,fat:3,prot:0,fib:0,portion:"10 olive"},
  {id:"f7",name:"Mandorle (10)",kcal:60,carb:1,fat:5,prot:2,fib:1,portion:"10 mandorle"},
  {id:"f8",name:"Noci (8 quarti / 10g)",kcal:70,carb:0,fat:10,prot:0,fib:0,portion:"10 g"},
  {id:"f9",name:"Uovo sodo",kcal:80,carb:0,fat:5,prot:12,fib:0,portion:"1 uovo"},
  {id:"f10",name:"Super Burger Valsoia (115g)",kcal:230,carb:13,fat:12,prot:18,fib:0,portion:"115 g"},
  {id:"f11",name:"Burger Valsoia base",kcal:130,carb:5,fat:5,prot:15,fib:4,portion:"1 burger"},
  {id:"f12",name:"Burger Findus Green Cuisine (100g)",kcal:200,carb:4,fat:16,prot:13,fib:6,portion:"100 g"},
  {id:"f13",name:"Burger Amadori (100g)",kcal:180,carb:5,fat:10,prot:16,fib:0,portion:"100 g"},
  {id:"f14",name:"Seitan (100g)",kcal:125,carb:11,fat:1,prot:0,fib:0,portion:"100 g"},
  {id:"f15",name:"Burger Heura (115g)",kcal:180,carb:6,fat:10,prot:0,fib:0,portion:"115 g"},
  {id:"f16",name:"Salsiccia Heura (100g / 2 salsicce)",kcal:150,carb:4,fat:7,prot:14,fib:5,portion:"100 g"},
  {id:"f17",name:"Polpette Valsoia",kcal:600,carb:10,fat:6,prot:0,fib:0,portion:"1 conf"},
  {id:"f18",name:"Tofu (100g)",kcal:120,carb:1.5,fat:7,prot:14,fib:0,portion:"100 g"},
  {id:"f19",name:"Tofu affumicato (100g)",kcal:170,carb:2.5,fat:9,prot:19,fib:0,portion:"100 g"},
  {id:"f20",name:"Affettati Mopur prosc. cotto (90g)",kcal:270,carb:10,fat:8,prot:33,fib:5,portion:"90 g"},
  {id:"f21",name:"Tonno Vuna (100g / mezzo baratt.)",kcal:280,carb:2,fat:20,prot:22,fib:0.7,portion:"100 g"},
  {id:"f22",name:"Fontina (100g)",kcal:390,carb:2,fat:30,prot:25,fib:0,portion:"100 g"},
  {id:"f23",name:"Verdure (100g)",kcal:100,carb:4,fat:0,prot:0,fib:0,portion:"100 g"},
  {id:"f24",name:"Cipolla (100g)",kcal:40,carb:10,fat:0,prot:0,fib:0,portion:"100 g"},
  {id:"f25",name:"Funghi (100g)",kcal:150,carb:4,fat:0.5,prot:0,fib:0,portion:"100 g"},
  {id:"f26",name:"Pasta all'uovo (100g)",kcal:370,carb:65,fat:5,prot:15,fib:0,portion:"100 g"},
  {id:"f27",name:"Lenticchie (100g)",kcal:360,carb:63,fat:2,prot:0,fib:0,portion:"100 g"},
  {id:"f28",name:"Patate (100g)",kcal:75,carb:16,fat:0,prot:2,fib:0,portion:"100 g"},
  {id:"f29",name:"Yogurt Soysun",kcal:100,carb:8,fat:0,prot:0,fib:0,portion:"1 vasetto"},
  {id:"f30",name:"Vino rosso (1 bicchiere)",kcal:80,carb:3,fat:0,prot:0,fib:0,portion:"1 bicchiere"},
  {id:"f31",name:"Birra Chouffe (33cl)",kcal:250,carb:20,fat:0,prot:0,fib:0,portion:"33 cl"},
];

const dateKey = d => d.toISOString().slice(0,10);
const todayKey = () => dateKey(new Date());
const dayName = d => DAYS_IT[new Date(d+"T12:00:00").getDay()];
const MESI=["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
const formatDate = dk => {const d=new Date(dk+"T12:00:00"); return `${d.getDate()} ${MESI[d.getMonth()]} ${d.getFullYear()}`;};

// localStorage helpers
const LS = {
  get(k) { try { const v=localStorage.getItem("dieta_"+k); return v ? JSON.parse(v) : null; } catch { return null; }},
  set(k,v) { try { localStorage.setItem("dieta_"+k, JSON.stringify(v)); } catch(e) { console.error(e); }},
};

function App() {
  const [view, setView] = useState(() => LS.get("profile") ? "home" : "onboarding");
  const [foods, setFoods] = useState(() => LS.get("foods_v2") || DEFAULT_FOODS);
  const [log, setLog] = useState(() => LS.get("log_"+todayKey()) || []);
  const [currentDate, setCurrentDate] = useState(todayKey());
  const [search, setSearch] = useState("");
  const [scanResult, setScanResult] = useState(null);
  const [scanProcessing, setScanProcessing] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState("");
  const [statsRange, setStatsRange] = useState("week");
  const [apiKey, setApiKey] = useState(() => LS.get("api_key") || "");
  const [apiKeyInput, setApiKeyInput] = useState("");
  const [statsData, setStatsData] = useState([]);
  const [profile, setProfile] = useState(() => LS.get("profile") || null);
  const [customTargets, setCustomTargets] = useState(() => LS.get("custom_targets") || null);
  const [obProfile, setObProfile] = useState({gender:"M",height:"",weight:"",age:""});
  const [obStep, setObStep] = useState(0); // 0=disclaimer, 1=form
  const [editingTargets, setEditingTargets] = useState(false);
  const calcTargets = profile ? scaledTargets(profile) : BASE_TARGETS;
  const TARGETS = (()=>{
    if (!customTargets) return calcTargets;
    const m={}; for (const d of Object.keys(calcTargets)) m[d]=customTargets[d]?{...calcTargets[d],...customTargets[d]}:calcTargets[d]; return m;
  })();
  const [nf, setNf] = useState({name:"",kcal:"",carb:"",fat:"",prot:"",fib:"",portion:""});
  const [qtyFood, setQtyFood] = useState(null); // food being qty-picked
  const [qtyVal, setQtyVal] = useState("1");
  const fileRef = useRef();
  const importRef = useRef();

  const exportData = () => {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith("dieta_")) data[k] = localStorage.getItem(k);
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "dieta_backup.json"; a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    e.target.value = "";
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        let count = 0;
        Object.entries(data).forEach(([k, v]) => {
          if (k.startsWith("dieta_")) { localStorage.setItem(k, v); count++; }
        });
        const sf = LS.get("foods_v2"); if (sf) setFoods(sf);
        const sl = LS.get("log_"+currentDate); if (sl) setLog(sl);
        const sk = LS.get("api_key"); if (sk) { setApiKey(sk); setApiKeyInput(sk); }
        alert("Importati " + count + " elementi!");
      } catch (err) { alert("Errore nel file: " + err.message); }
    };
    reader.readAsText(file);
  };

  // Load log when date changes
  useEffect(() => { setLog(LS.get("log_"+currentDate) || []); }, [currentDate]);

  const saveLog = useCallback((newLog) => {
    setLog(newLog);
    LS.set("log_"+currentDate, newLog);
    const hist = LS.get("history_dates") || [];
    if (!hist.includes(currentDate)) { hist.push(currentDate); LS.set("history_dates", hist); }
  }, [currentDate]);

  const totals = log.reduce((a,e) => ({
    kcal:a.kcal+e.kcal*e.qty, carb:a.carb+e.carb*e.qty,
    fat:a.fat+e.fat*e.qty, prot:a.prot+e.prot*e.qty, fib:a.fib+e.fib*e.qty,
  }),{kcal:0,carb:0,fat:0,prot:0,fib:0});

  const target = TARGETS[dayName(currentDate)] || TARGETS.MARTEDI;

  const addFood = (food, qty=1) => {
    const entry = {id:Date.now(),foodId:food.id,name:food.name,kcal:food.kcal,carb:food.carb,fat:food.fat,prot:food.prot,fib:food.fib,qty};
    saveLog([...log,entry]);
    setView("home"); setSearch("");
  };

  const removeEntry = id => saveLog(log.filter(e=>e.id!==id));

  const startEdit = e => { setEditingId(e.id); setEditName(e.name); };
  const confirmEdit = () => {
    if (editingId && editName.trim()) {
      const entry = log.find(e=>e.id===editingId);
      saveLog(log.map(e=>e.id===editingId?{...e,name:editName.trim()}:e));
      if (entry?.foodId) {
        const nFoods = foods.map(f=>f.id===entry.foodId?{...f,name:editName.trim()}:f);
        setFoods(nFoods); LS.set("foods_v2", nFoods);
      }
    }
    setEditingId(null);
  };

  const loadStats = useCallback(() => {
    const days=[]; const count = statsRange==="week"?7:30; const today=new Date();
    for (let i=count-1;i>=0;i--) {
      const d=new Date(today); d.setDate(d.getDate()-i);
      const dk=dateKey(d), dn=dayName(dk), t=TARGETS[dn]||TARGETS.MARTEDI;
      const dayLog = LS.get("log_"+dk) || [];
      const tot = dayLog.reduce((a,e)=>({kcal:a.kcal+e.kcal*e.qty,carb:a.carb+e.carb*e.qty,fat:a.fat+e.fat*e.qty,prot:a.prot+e.prot*e.qty,fib:a.fib+e.fib*e.qty}),{kcal:0,carb:0,fat:0,prot:0,fib:0});
      days.push({date:dk,day:dn.slice(0,3),target:t,totals:tot,hasData:dayLog.length>0});
    }
    setStatsData(days);
  },[statsRange]);

  useEffect(()=>{ if(view==="stats") loadStats(); },[statsRange,view,loadStats]);

  const saveNewFood = () => {
    const food = {id:"u"+Date.now(),name:nf.name,kcal:parseFloat(nf.kcal)||0,carb:parseFloat(nf.carb)||0,fat:parseFloat(nf.fat)||0,prot:parseFloat(nf.prot)||0,fib:parseFloat(nf.fib)||0,portion:nf.portion||"1 porzione"};
    const nFoods=[...foods,food]; setFoods(nFoods); LS.set("foods_v2",nFoods);
    addFood(food);
    setNf({name:"",kcal:"",carb:"",fat:"",prot:"",fib:"",portion:""}); setView("home");
  };

  // Camera / OCR
  const handleScan = async (e) => {
    const file = e.target.files?.[0]; if(!file) return;
    e.target.value="";
    setScanProcessing(true); setScanResult(null); setView("scan");
    try {
      if (!apiKey) { setScanResult({error:true,detail:"API key non configurata. Vai in ⚙ Impostazioni."}); setScanProcessing(false); return; }
      const b64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("read fail"));r.readAsDataURL(file);});
      const mediaType = file.type || "image/jpeg";
      const resp = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:mediaType,data:b64}},
          {type:"text",text:`Questa è la tabella nutrizionale di un prodotto alimentare. Estrai i valori nutrizionali e rispondi SOLO con un JSON valido (senza backtick markdown) con questi campi esatti:
{"name":"nome del prodotto se visibile, altrimenti 'Prodotto scansionato'","kcal":numero calorie per porzione o per 100g,"carb":carboidrati in grammi,"fat":grassi in grammi,"prot":proteine in grammi,"fib":fibre in grammi,"portion":"porzione di riferimento es. '100 g'"}
Se non riesci a leggere un valore, metti 0.`}
        ]}]})
      });
      const data = await resp.json();
      if (data.error) { setScanResult({error:true,detail:data.error.message||JSON.stringify(data.error)}); setScanProcessing(false); return; }
      const text = data.content?.map(c=>c.text||"").join("")||"";
      const clean = text.replace(/```json|```/g,"").trim();
      setScanResult(JSON.parse(clean));
    } catch(err) { console.error(err); setScanResult({error:true,detail:err.message}); }
    setScanProcessing(false);
  };

  const saveScanResult = () => {
    if(!scanResult||scanResult.error) return;
    const food={id:"s"+Date.now(),name:scanResult.name||"Prodotto scansionato",kcal:parseFloat(scanResult.kcal)||0,carb:parseFloat(scanResult.carb)||0,fat:parseFloat(scanResult.fat)||0,prot:parseFloat(scanResult.prot)||0,fib:parseFloat(scanResult.fib)||0,portion:scanResult.portion||"1 porzione"};
    const nFoods=[...foods,food]; setFoods(nFoods); LS.set("foods_v2",nFoods);
    addFood(food); setScanResult(null);
  };

  const shiftDate = n => { const d=new Date(currentDate+"T12:00:00"); d.setDate(d.getDate()+n); setCurrentDate(dateKey(d)); };
  const isToday = currentDate===todayKey();
  const pct = (v,m) => m>0?Math.min(v/m*100,100):0;
  const over = (v,m) => v>m;
  const filtered = foods.filter(f=>f.name.toLowerCase().includes(search.toLowerCase()));

  const C={accent:"#E8572A",bg:"#0D0D0D",card:"#1A1A1A",card2:"#242424",t1:"#F0EDE6",t2:"#8A8780",green:"#4CAF50",red:"#E8572A"};
  const SB={background:"none",border:"none",color:C.t2,fontSize:22,padding:"8px 12px",cursor:"pointer"};
  const SBack={background:"none",border:"none",color:C.t1,fontSize:22,padding:"4px 8px",cursor:"pointer"};
  const SBtn=(bg)=>({border:"none",borderRadius:14,padding:"14px 18px",fontSize:15,fontWeight:600,color:C.t1,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",background:bg});
  const SInput={width:"100%",boxSizing:"border-box",background:C.card,border:"1px solid #333",borderRadius:10,padding:"12px 14px",color:C.t1,fontSize:15,outline:"none"};

  return (
    <div>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleScan} style={{display:"none"}}/>

      {/* ── ONBOARDING ── */}
      {view==="onboarding"&&<>
        <div style={{padding:"20px",minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center"}}>
          {obStep===0&&<>
            <div style={{fontSize:28,fontWeight:700,marginBottom:8,lineHeight:1.2}}>Dieta Tracker</div>
            <div style={{fontSize:14,color:C.t2,marginBottom:24,lineHeight:1.5}}>Monitoraggio alimentare</div>

            <div style={{background:C.card,borderRadius:14,padding:18,marginBottom:20,fontSize:13,lineHeight:1.7,color:C.t2}}>
              <p style={{marginBottom:12,color:C.t1,fontWeight:600,fontSize:14}}>⚠ Leggi attentamente prima di iniziare</p>
              <p style={{marginBottom:12}}>Questa app è uno <span style={{color:C.t1}}>strumento di monitoraggio alimentare</span>. Ti permette di registrare quello che mangi e confrontarlo con i limiti giornalieri che hai impostato.</p>
              <p style={{marginBottom:12}}>Di default, l'app propone uno schema dimagrante basato sulla <span style={{color:C.t1}}>ciclizzazione dei carboidrati</span>, calibrato per un livello di attività fisica moderata. Questo schema <span style={{color:C.t1}}>non è stato realizzato da un nutrizionista né da un medico</span>, ma dall'autore sulla base di esperienze personali e letture.</p>
              <p style={{marginBottom:12}}>Tutti i valori giornalieri sono <span style={{color:C.t1}}>completamente modificabili</span> nelle impostazioni: puoi adattarli a qualsiasi regime alimentare, incluso quello prescritto dal tuo nutrizionista o medico.</p>
              <p style={{marginBottom:12}}>L'app include una lista di alimenti predefiniti a cui puoi aggiungerne di nuovi in qualsiasi momento, anche <span style={{color:C.t1}}>inquadrando con la fotocamera la tabella nutrizionale</span> sulla confezione di un prodotto. Per ogni alimento puoi indicare il numero di porzioni consumate, anche frazionarie (es. 0.5, 1.5).</p>
              <p style={{color:C.red,fontWeight:600}}>Consulta sempre un professionista prima di iniziare qualsiasi dieta. L'uso di questa app è sconsigliato in presenza di problemi di salute, condizioni mediche preesistenti, disturbi alimentari, gravidanza o allattamento.</p>
            </div>

            <button onClick={()=>setObStep(1)} style={{...SBtn(C.accent),width:"100%",fontSize:16}}>
              Ho capito, continua
            </button>
          </>}

          {obStep===1&&<>
            <div style={{fontSize:22,fontWeight:700,marginBottom:4}}>I tuoi dati</div>
            <div style={{fontSize:13,color:C.t2,marginBottom:20,lineHeight:1.5}}>Servono per calcolare i limiti giornalieri personalizzati di calorie e macronutrienti.</div>

            <div style={{marginBottom:16}}>
              <label style={{fontSize:12,color:C.t2,display:"block",marginBottom:8}}>Genere</label>
              <div style={{display:"flex",gap:8}}>
                {["M","F"].map(g=>(
                  <button key={g} onClick={()=>setObProfile({...obProfile,gender:g})}
                    style={{...SBtn(obProfile.gender===g?C.accent:C.card2),flex:1,padding:"12px",fontSize:15}}>
                    {g==="M"?"♂ Uomo":"♀ Donna"}
                  </button>
                ))}
              </div>
            </div>

            {[{k:"height",l:"Altezza (cm)",ph:"175"},{k:"weight",l:"Peso (kg)",ph:"80"},{k:"age",l:"Età",ph:"35"}].map(f=>(
              <div key={f.k} style={{marginBottom:14}}>
                <label style={{fontSize:12,color:C.t2,display:"block",marginBottom:4}}>{f.l}</label>
                <input value={obProfile[f.k]} onChange={e=>setObProfile({...obProfile,[f.k]:e.target.value})}
                  type="number" inputMode="decimal" placeholder={f.ph}
                  style={{...SInput,fontSize:16,fontFamily:"'DM Mono',monospace"}}/>
              </div>
            ))}

            {(()=>{
              const h=parseFloat(obProfile.height), w=parseFloat(obProfile.weight), a=parseFloat(obProfile.age);
              const valid = h>100 && h<250 && w>30 && w<300 && a>14 && a<100;
              if (valid) {
                const p={gender:obProfile.gender,height:h,weight:w,age:a};
                const bmr=calcBMR(p);
                const t=scaledTargets(p);
                return <>
                  <div style={{background:C.card2,borderRadius:10,padding:14,marginBottom:16,fontSize:12,color:C.t2}}>
                    <div style={{marginBottom:6}}>BMR stimato: <span style={{color:C.t1,fontFamily:"'DM Mono',monospace",fontWeight:600}}>{Math.round(bmr)} kcal/giorno</span></div>

            {!editingTargets&&<div style={{fontSize:11,color:C.t2,marginBottom:8}}>Valori calcolati dal tuo profilo. Tocca "Modifica" per personalizzarli (es. su indicazione di un nutrizionista).</div>}
            {editingTargets&&<>
              <div style={{fontSize:11,color:C.t2,marginBottom:12}}>Modifica i valori per ciascun giorno. I campi vuoti usano il valore calcolato dal profilo.</div>
              {["LUNEDI","MARTEDI","MERCOLEDI","GIOVEDI","VENERDI","SABATO","DOMENICA"].map(day=>{
                const ct=calcTargets[day]; const cu=customTargets?.[day]||{};
                const dayLabel={LUNEDI:"Lunedì",MARTEDI:"Martedì",MERCOLEDI:"Mercoledì",GIOVEDI:"Giovedì",VENERDI:"Venerdì",SABATO:"Sabato",DOMENICA:"Domenica"}[day];
                return <div key={day} style={{background:C.card,borderRadius:12,padding:14,marginBottom:8}}>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{dayLabel}</div>
                  <div style={{fontSize:10,color:C.accent,marginBottom:8}}>{ct.label}</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                    {[{k:"kcal",l:"Calorie"},{k:"carb",l:"Carb (g)"},{k:"fat",l:"Grassi (g)"},{k:"prot",l:"Proteine (g)"},{k:"fib",l:"Fibre (g)"}].map(f=>(
                      <div key={f.k}>
                        <label style={{fontSize:9,color:C.t2}}>{f.l}</label>
                        <input value={cu[f.k]!==undefined?cu[f.k]:""} placeholder={String(ct[f.k])}
                          onChange={e=>{
                            const val=e.target.value; const newCu={...cu};
                            if(val==="") { delete newCu[f.k]; } else { newCu[f.k]=parseFloat(val)||0; }
                            const newCT={...(customTargets||{})}; 
                            if(Object.keys(newCu).length===0) { delete newCT[day]; } else { newCT[day]=newCu; }
                            const final=Object.keys(newCT).length>0?newCT:null;
                            setCustomTargets(final); LS.set("custom_targets",final);
                          }}
                          type="number" inputMode="decimal"
                          style={{width:"100%",boxSizing:"border-box",background:C.card2,border:cu[f.k]!==undefined?"1px solid "+C.accent:"1px solid #333",borderRadius:6,padding:"6px 8px",color:C.t1,fontSize:13,fontFamily:"'DM Mono',monospace",outline:"none"}}/>
                      </div>
                    ))}
                  </div>
                </div>;
              })}
              {customTargets&&<button onClick={()=>{setCustomTargets(null);LS.set("custom_targets",null)}}
                style={{fontSize:12,color:C.t2,background:"none",border:"none",padding:"4px 0",cursor:"pointer",textDecoration:"underline",marginBottom:8}}>
                Ripristina tutti i valori calcolati
              </button>}
            </>}
          </div>

          <div style={{borderTop:"1px solid #333",marginTop:24,paddingTop:20}}>
          <div style={{fontSize:12,color:C.t2,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:12}}>SCANSIONE ETICHETTE</div>
          <label style={{fontSize:12,color:C.t2,display:"block",marginBottom:6}}>API Key Anthropic</label>
          <input value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} type="password" placeholder="sk-ant-..."
            style={{...SInput,fontSize:14,fontFamily:"'DM Mono',monospace"}}/>
          <button onClick={()=>{setApiKey(apiKeyInput);LS.set("api_key",apiKeyInput)}}
            style={{...SBtn(C.accent),width:"100%",marginTop:12,opacity:apiKeyInput?1:0.4}}>
            {apiKey?"Aggiorna chiave":"Salva chiave"}
          </button>
          {apiKey&&<div style={{fontSize:12,color:C.green,marginTop:8}}>✓ Chiave configurata</div>}
          <div style={{fontSize:11,color:C.t2,marginTop:12}}>La chiave viene salvata solo sul tuo dispositivo e usata esclusivamente per analizzare le foto delle etichette nutrizionali via API Anthropic.</div>
          </div>

          <div style={{borderTop:"1px solid #333",marginTop:24,paddingTop:20}}>
            <div style={{fontSize:12,color:C.t2,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:12}}>BACKUP DATI</div>
            <button onClick={exportData} style={{...SBtn(C.card2),width:"100%",fontSize:14,marginBottom:10}}>
              📤 Esporta dati (JSON)
            </button>
            <button onClick={()=>importRef.current?.click()} style={{...SBtn(C.card2),width:"100%",fontSize:14}}>
              📥 Importa dati (JSON)
            </button>
            <input ref={importRef} type="file" accept=".json,application/json" onChange={importData} style={{display:"none"}}/>
            <div style={{fontSize:11,color:C.t2,marginTop:10}}>Usa l'esportazione per trasferire i dati tra browser e webapp, o come backup di sicurezza.</div>
          </div>
        </div>
      </>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
